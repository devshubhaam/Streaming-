<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TGStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080a0f;
    --surface: #0f1117;
    --card: #13161e;
    --border: #1e2230;
    --accent: #e8383d;
    --accent2: #ff6b35;
    --text: #e8eaf0;
    --muted: #5a5f72;
    --glow: rgba(232, 56, 61, 0.25);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(16px, 4vw, 48px);
    height: 60px;
    background: rgba(8,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 3px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    cursor: pointer;
  }

  .logo span {
    color: var(--accent);
  }

  .logo-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--accent);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.7); }
  }

  .nav-tag {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── PAGES ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── HOME PAGE ── */
  #home {
    padding-top: 80px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .hero {
    text-align: center;
    padding: clamp(40px, 8vw, 80px) clamp(16px, 4vw, 48px) clamp(32px, 6vw, 64px);
    position: relative;
  }

  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.72rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    padding: 6px 14px;
    border: 1px solid rgba(232,56,61,0.3);
    border-radius: 20px;
    background: rgba(232,56,61,0.05);
  }

  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 0.9;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #fff 30%, #9095a8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }

  .hero h1 em {
    font-style: normal;
    -webkit-text-fill-color: transparent;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 1rem;
    max-width: 400px;
    margin: 0 auto;
    line-height: 1.7;
    font-weight: 300;
  }

  /* ── VIDEO GRID ── */
  .grid-section {
    padding: clamp(32px, 6vw, 64px) clamp(16px, 4vw, 48px);
    max-width: 1200px;
    margin: 0 auto;
  }

  .section-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .video-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    position: relative;
  }

  .video-card:hover {
    transform: translateY(-4px);
    border-color: rgba(232,56,61,0.4);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(232,56,61,0.1);
  }

  .card-thumb {
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, #0f1117 0%, #1a1e2a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-thumb::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--thumb-gradient, linear-gradient(135deg, #1a1e30, #0d1020));
  }

  .play-icon {
    width: 52px; height: 52px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    transition: background 0.2s, transform 0.2s;
    backdrop-filter: blur(8px);
  }

  .video-card:hover .play-icon {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.1);
  }

  .play-icon svg {
    width: 18px; height: 18px;
    fill: white;
    margin-left: 3px;
  }

  .duration-badge {
    position: absolute;
    bottom: 8px; right: 8px;
    background: rgba(0,0,0,0.7);
    font-size: 0.7rem;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 4px;
    z-index: 1;
    font-weight: 500;
  }

  .card-info {
    padding: 14px 16px 16px;
  }

  .card-title {
    font-size: 0.95rem;
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 6px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-tag {
    font-size: 0.68rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  .card-quality {
    font-size: 0.65rem;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .watch-btn {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    font-weight: 500;
  }

  .watch-btn:hover, .video-card:hover .watch-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── PLAYER PAGE ── */
  #player {
    padding-top: 60px;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  .player-wrap {
    max-width: 960px;
    margin: 0 auto;
    padding: clamp(20px, 4vw, 40px) clamp(16px, 4vw, 32px);
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    padding: 0;
    margin-bottom: 24px;
    transition: color 0.2s;
  }

  .back-btn:hover { color: var(--text); }

  .back-btn svg {
    width: 16px; height: 16px;
    stroke: currentColor;
    fill: none;
    transition: transform 0.2s;
  }

  .back-btn:hover svg { transform: translateX(-3px); }

  .player-container {
    position: relative;
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
  }

  /* Block right-click & context menu on video container */
  .player-container video {
    display: block;
    width: 100%;
    max-height: 75vh;
    background: #000;
  }

  .player-container::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(to bottom, transparent 70%, rgba(0,0,0,0.3));
    border-radius: 14px;
  }

  /* Transparent overlay to intercept right-click on video */
  .video-shield {
    position: absolute;
    inset: 0;
    z-index: 2;
    cursor: default;
  }

  .player-meta {
    margin-top: 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .player-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: 2px;
    line-height: 1;
    color: var(--text);
  }

  .player-tag {
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-top: 6px;
  }

  .player-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .player-badge .live-dot {
    width: 6px; height: 6px;
    background: #4ade80;
    border-radius: 50%;
    box-shadow: 0 0 8px #4ade80;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }

  /* Loading state */
  .loading-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(8,10,15,0.85);
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    border-radius: 14px;
  }

  .loading-overlay.show { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── ADD VIDEO SECTION ── */
  .add-section {
    margin-top: 48px;
    padding: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .add-section h3 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 2px;
    font-size: 1.1rem;
    margin-bottom: 16px;
    color: var(--muted);
  }

  .add-form {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 10px;
  }

  @media (max-width: 600px) {
    .add-form { grid-template-columns: 1fr; }
  }

  .add-form input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-form input::placeholder { color: var(--muted); }
  .add-form input:focus { border-color: var(--accent); }

  .add-form button {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.2s;
    white-space: nowrap;
  }

  .add-form button:hover { opacity: 0.85; }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 32px;
    color: var(--muted);
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-top: 1px solid var(--border);
    margin-top: 60px;
    position: relative;
    z-index: 1;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .video-card {
    animation: fadeUp 0.4s ease both;
  }

  .video-card:nth-child(1) { animation-delay: 0.05s; }
  .video-card:nth-child(2) { animation-delay: 0.1s; }
  .video-card:nth-child(3) { animation-delay: 0.15s; }
  .video-card:nth-child(4) { animation-delay: 0.2s; }
  .video-card:nth-child(5) { animation-delay: 0.25s; }
  .video-card:nth-child(6) { animation-delay: 0.3s; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* Mobile */
  @media (max-width: 480px) {
    .video-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo" onclick="showHome()">
    <div class="logo-dot"></div>
    TG<span>STREAM</span>
  </div>
  <div class="nav-tag">Telegram · Video</div>
</nav>

<!-- HOME PAGE -->
<div id="home" class="page active">
  <div class="hero">
    <div class="hero-eyebrow">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="4"/></svg>
      Telegram Powered Streaming
    </div>
    <h1>WATCH<br><em>ANYTHING.</em></h1>
    <p>Stream videos stored in Telegram — directly in your browser. No downloads, no limits.</p>
  </div>

  <div class="grid-section">
    <div class="section-label">Videos</div>
    <div class="video-grid" id="videoGrid"></div>

    <!-- Add video form -->
    <div class="add-section">
      <h3>Add Video</h3>
      <div class="add-form">
        <input type="text" id="inputTitle" placeholder="Video title">
        <input type="text" id="inputFileId" placeholder="Telegram file_id">
        <button onclick="addVideo()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER PAGE -->
<div id="player" class="page">
  <div class="player-wrap">
    <button class="back-btn" onclick="showHome()">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      All Videos
    </button>

    <div class="player-container" id="playerContainer">
      <div class="loading-overlay show" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading Stream</div>
      </div>
      <video
        id="videoEl"
        controls
        autoplay
        playsinline
        preload="metadata"
        controlslist="nodownload nofullscreen noremoteplayback"
        disablePictureInPicture
      ></video>
      <!-- Shield: blocks right-click on video element -->
      <div class="video-shield"
        oncontextmenu="return false"
        ondragstart="return false"
        onclick="togglePlay()">
      </div>
    </div>

    <div class="player-meta">
      <div>
        <div class="player-title" id="playerTitle">Video</div>
        <div class="player-tag" id="playerTag">Telegram Stream</div>
      </div>
      <div class="player-badge">
        <div class="live-dot"></div>
        Live Stream
      </div>
    </div>
  </div>
</div>

<footer>TGStream &nbsp;·&nbsp; Powered by Telegram Bot API</footer>

<script>
// ── DATA ──────────────────────────────────────────────
// Replace FILE_ID_HERE with your actual Telegram file_ids
let videos = JSON.parse(localStorage.getItem('tgstream_videos') || 'null') || [
  {
    id: 1,
    title: "Sample Video 1",
    file_id: "FILE_ID_HERE",
    tag: "Demo",
    duration: "0:30",
    gradient: "linear-gradient(135deg, #1a0a2e, #2d1b4e)"
  },
  {
    id: 2,
    title: "Sample Video 2",
    file_id: "FILE_ID_HERE_2",
    tag: "Demo",
    duration: "1:00",
    gradient: "linear-gradient(135deg, #0a1a1a, #0d3030)"
  }
];

function saveVideos() {
  localStorage.setItem('tgstream_videos', JSON.stringify(videos));
}

// ── RENDER GRID ──────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('videoGrid');
  grid.innerHTML = videos.map(v => `
    <div class="video-card" onclick="playVideo(${v.id})">
      <div class="card-thumb" style="--thumb-gradient: ${v.gradient || 'linear-gradient(135deg,#1a1e30,#0d1020)'}">
        <div class="play-icon">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </div>
        ${v.duration ? `<div class="duration-badge">${v.duration}</div>` : ''}
      </div>
      <div class="card-info">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <span class="card-tag">${v.tag || 'Video'}</span>
          <span class="card-quality">MP4</span>
        </div>
      </div>
      <button class="watch-btn" onclick="event.stopPropagation(); playVideo(${v.id})">Watch Now</button>
    </div>
  `).join('');
}

// ── NAVIGATION ───────────────────────────────────────
function showHome() {
  const vid = document.getElementById('videoEl');
  vid.pause();
  vid.src = '';
  document.getElementById('home').classList.add('active');
  document.getElementById('player').classList.remove('active');
  window.scrollTo(0, 0);
}

function playVideo(id) {
  const v = videos.find(x => x.id === id);
  if (!v) return;

  document.getElementById('home').classList.remove('active');
  document.getElementById('player').classList.add('active');
  window.scrollTo(0, 0);

  document.getElementById('playerTitle').textContent = v.title;
  document.getElementById('playerTag').textContent = v.tag || 'Telegram Stream';

  const videoEl = document.getElementById('videoEl');
  const loader = document.getElementById('loadingOverlay');

  loader.classList.add('show');
  videoEl.src = '';

  setTimeout(() => {
    videoEl.src = `/api/video/${v.file_id}`;
    videoEl.load();

    videoEl.oncanplay = () => loader.classList.remove('show');
    videoEl.onerror = () => {
      loader.innerHTML = `
        <div style="text-align:center;color:#5a5f72">
          <div style="font-size:2rem;margin-bottom:12px">⚠️</div>
          <div style="letter-spacing:2px;font-size:0.75rem;text-transform:uppercase">Failed to load video</div>
          <div style="margin-top:8px;font-size:0.7rem;color:#3a3f52">Check file_id or bot token</div>
        </div>`;
      loader.classList.add('show');
    };
  }, 100);
}

// Toggle play via shield click
function togglePlay() {
  const v = document.getElementById('videoEl');
  v.paused ? v.play() : v.pause();
}

// ── ADD VIDEO ────────────────────────────────────────
const gradients = [
  "linear-gradient(135deg, #1a0a2e, #2d1b4e)",
  "linear-gradient(135deg, #0a1a1a, #0d3030)",
  "linear-gradient(135deg, #1a0a0a, #3a1010)",
  "linear-gradient(135deg, #0a0a1a, #101040)",
  "linear-gradient(135deg, #1a1200, #302200)",
  "linear-gradient(135deg, #001a0a, #003018)",
];

function addVideo() {
  const title = document.getElementById('inputTitle').value.trim();
  const file_id = document.getElementById('inputFileId').value.trim();
  if (!title || !file_id) return alert('Please enter both title and file_id');

  const newVid = {
    id: Date.now(),
    title,
    file_id,
    tag: 'Custom',
    gradient: gradients[Math.floor(Math.random() * gradients.length)]
  };

  videos.push(newVid);
  saveVideos();
  renderGrid();

  document.getElementById('inputTitle').value = '';
  document.getElementById('inputFileId').value = '';
}

// ── PROTECTION ───────────────────────────────────────
document.addEventListener('contextmenu', e => {
  if (e.target.tagName === 'VIDEO' || e.target.closest('.player-container')) {
    e.preventDefault();
  }
});

document.addEventListener('keydown', e => {
  // Block Ctrl+S, Ctrl+U (view source), F12 devtools (basic deterrent)
  if ((e.ctrlKey && ['s','u'].includes(e.key.toLowerCase()))) {
    e.preventDefault();
  }
});

// ── INIT ─────────────────────────────────────────────
renderGrid();
